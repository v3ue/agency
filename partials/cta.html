<!-- CTA Section -->
<section id="cta" aria-labelledby="cta-heading" class="section-padding-cta">
  <div class="max-w-1200 mx-auto px-5">
    <div class="mb-40 text-center">
      <h2 id="cta-heading" class="h2 text-heading text-white mb-6 max-w-[600px] mx-auto text-reveal cta-heading-size">
        <span class="text-reveal-inner reveal-delay-02s">Проекты начинаются здесь</span>
      </h2>
      <p class="text-white/50 text-xl [font-family:'Open Sans', sans-serif] tracking-normal max-w-[800px] mx-auto text-reveal reveal-delay-04s">
        <span class="text-reveal-inner reveal-delay-04s">Достаточно заполнить форму — мы свяжемся в течение дня</span>
      </p>
    </div>
    <form class="cta-grid mb-24">
      <div class="cta-col-1 fade-up-delay-04s">
        <div class="form-field">
          <label for="cta-name">Имя</label>
          <input id="cta-name" type="text" value="">
          <div class="line-bg"></div>
          <div class="line-gradient"></div>
          <p class="error-msg"></p>
        </div>
      </div>
      <div class="cta-col-2 fade-up-delay-05s">
        <div class="form-field">
          <label for="cta-email">Почта</label>
          <input id="cta-email" type="email" value="">
          <div class="line-bg"></div>
          <div class="line-gradient"></div>
          <p class="error-msg"></p>
        </div>
      </div>
      <div class="cta-col-3 fade-up-delay-06s">
        <div class="form-field">
          <label for="cta-message">О проекте</label>
          <textarea id="cta-message" rows="1"></textarea>
          <div class="line-bg"></div>
          <div class="line-gradient"></div>
          <p class="error-msg"></p>
        </div>
        <button type="button" class="submit-btn">
          <span>Отправить</span>
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M25 13L5 13" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M14 3L25 13L14 23" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </form>
    <div class="flex flex-col gap-8 items-center mt-32 fade-up-delay-08s cta-contacts">
      <div class="flex flex-col gap-6 items-center">
        <a href="tel:+79169950270" class="text-white [font-family:'Fixel Display', sans-serif] font-medium tracking-[-0.03em] hover:opacity-70 transition-opacity cta-contact-link">+7 (916) 995 02 70</a>
        <a href="mailto:hi@1220.ru" class="text-white [font-family:'Fixel Display', sans-serif] font-medium tracking-[-0.03em] hover:opacity-70 transition-opacity cta-contact-link">hi@1220.ru</a>
      </div>
      <span class="text-white/50 text-sm [font-family:'Open Sans', sans-serif] tracking-normal mt-4">Будем рады пообщаться по любым вопросам</span>
    </div>
  </div>
</section>
