<!-- Projects Section -->
<div id="projects-outer">
  <div id="projects-inner">
    <section id="projects-section" aria-labelledby="projects-heading">
      <div class="container-wide projects-inner-flex">
        <div class="projects-heading-wrapper">
          <h2 id="projects-heading" class="h2 text-heading text-[#f8f8f8] projects-heading">Проекты</h2>
        </div>
        <div class="thumbnail-sidebar-vertical" id="thumbnailSidebar">
          <ul class="thumbnail-list-vertical" id="thumbnailList">
            <li>
              <button class="thumbnail-btn-vertical" data-index="0">
                <span class="sr-only">Изофом</span>
                <img src="./static/images/4lg5t-1.jpg" alt="Изофом" class="thumbnail-img">
              </button>
            </li>
            <li>
              <button class="thumbnail-btn-vertical" data-index="1">
                <span class="sr-only">C-Tea</span>
                <img src="./static/images/frame-12@2x.png" alt="C-Tea" class="thumbnail-img">
              </button>
            </li>
            <li>
              <button class="thumbnail-btn-vertical" data-index="2">
                <span class="sr-only">Янта</span>
                <img src="./static/images/hf-20260428-171201-db32a14f-5f28-4856-bad4-6b4aef3c6ff0-1.png" alt="Янта" class="thumbnail-img">
              </button>
            </li>
            <li>
              <button class="thumbnail-btn-vertical" data-index="3">
                <span class="sr-only">Особый ремонт</span>
                <img src="./static/images/6l06a-1.png" alt="Особый ремонт" class="thumbnail-img">
              </button>
            </li>
          </ul>
          <div class="thumbnail-indicator-vertical" id="thumbnailIndicator"></div>
        </div>
        <div class="video-main-area">
          <div class="video-display" id="videoDisplay">
            <div class="video-wrapper" id="currentVideo"></div>
          </div>
          <div class="video-info" id="videoInfo">
            <h2 class="video-title video-title-style" id="videoTitle">Изофом</h2>
            <p class="video-description video-desc-style" id="videoDescription">Серия объясняющих роликов для производителя строительного материала.</p>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- Watch All Projects Link -->
<div class="watch-all-wrapper">
  <a href="/project" class="group inline-flex items-center gap-2 border-b-2 pb-0 watch-all-link">
    <span class="inline-flex items-center transition-transform duration-300 group-hover:translate-x-1">
      <img src="./static/icons/arrow-watch.svg" alt="Смотреть" class="h-8 w-auto align-middle watch-all-icon">
    </span>
    <span class="text-body text-[#f8f8f8] text-xl md:text-[28px] tracking-normal leading-[1.0]">Смотреть все проекты</span>
  </a>
</div>
